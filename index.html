<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashupData - Maintenance in Progress</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans antialiased selection:bg-blue-500/30 min-h-screen flex items-center justify-center relative overflow-hidden">
    
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-blue-600/20 rounded-full blur-[120px] -z-10"></div>

    <main class="w-full max-w-2xl px-4 z-10">
        <div class="glass p-10 md:p-16 rounded-3xl text-center shadow-2xl border-t border-blue-500/20">
            
            <div class="flex items-center justify-center gap-3 mb-8">
                <img src="logo.png" alt="DashupData Logo" class="h-10 w-auto opacity-90">
                <span class="text-3xl md:text-4xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-500">DashupData</span>
            </div>

            <div class="w-20 h-20 bg-gray-900/50 border border-gray-800 rounded-2xl flex items-center justify-center mx-auto mb-8 text-blue-400 animate-pulse">
                <svg class="w-10 h-10 animate-[spin_4s_linear_infinite]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </div>

            <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight mb-4 text-white">
                We're upgrading your experience.
            </h1>
            <p class="text-lg text-gray-400 mb-10 leading-relaxed max-w-lg mx-auto">
                DashupData is currently undergoing scheduled maintenance to improve our AI analysis and dashboard speeds. We'll be back online shortly.
            </p>

            <div class="inline-flex flex-col items-center justify-center p-4 rounded-xl bg-gray-900/50 border border-gray-800">
                <span class="text-sm text-gray-500 mb-1">Need urgent assistance?</span>
                <a href="mailto:Himanshusehgal320@gmail.com" class="text-blue-400 hover:text-blue-300 transition-colors font-medium">Himanshusehgal320@gmail.com</a>
            </div>

        </div>
        
        <div class="text-center mt-12 text-gray-600 text-sm">
            &copy; 2026 DashupData. All rights reserved.
        </div>
    </main>

</body>
</html>
