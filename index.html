<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Under Maintenance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f6f9;
            color: #333;
            text-align: center;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 15px;
            color: #e67e22;
        }

        p {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🛠️</div>
    <h1>Website Under Maintenance</h1>
    <p>
        We are currently performing scheduled maintenance.<br><br>
        Please check back again shortly.<br>
        Thank you for your patience.
    </p>
</div>

</body>
</html>
